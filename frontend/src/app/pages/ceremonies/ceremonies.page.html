<section class="card shadow-sm mb-4">
  <div class="card-header bg-white"><strong>{{ editingId ? 'Modifier' : 'Créer' }} une cérémonie</strong></div>
  <div class="card-body row g-2">
    <div class="col-md-6">
      <label class="form-label">Titre</label>
      <input class="form-control" [(ngModel)]="form.title" placeholder="Titre">
    </div>
    <div class="col-md-3">
      <label class="form-label">Date</label>
      <input class="form-control" type="date" [(ngModel)]="form.date">
    </div>
    <div class="col-md-3">
      <label class="form-label">Invités</label>
      <input class="form-control" type="number" [(ngModel)]="form.guestCount" min="1" placeholder="Invités">
    </div>
    <div class="col-md-3">
      <label class="form-label">Début</label>
      <input class="form-control" type="time" [(ngModel)]="form.startTime">
    </div>
    <div class="col-md-3">
      <label class="form-label">Fin</label>
      <input class="form-control" type="time" [(ngModel)]="form.endTime">
    </div>
    <div class="col-md-6">
      <label class="form-label">Lieu</label>
      <input class="form-control" [(ngModel)]="form.location" placeholder="Lieu">
    </div>
    <div class="col-12 d-flex gap-2">
      <button class="btn btn-primary" [disabled]="isSaving" (click)="saveCeremony()">
        {{ isSaving ? 'Enregistrement...' : (editingId ? 'Mettre à jour' : 'Enregistrer') }}
      </button>
      <button class="btn btn-outline-secondary" *ngIf="editingId" [disabled]="isSaving" (click)="resetForm()">Annuler</button>
    </div>
  </div>
</section>

<div class="alert alert-danger" *ngIf="error">{{ error }}</div>
<div class="alert alert-info" *ngIf="loading">Chargement...</div>

<section class="card shadow-sm" *ngIf="!loading">
  <div class="card-header bg-white"><strong>Liste des cérémonies</strong></div>
  <ul class="list-group list-group-flush">
    <li class="list-group-item" *ngFor="let ceremony of ceremonies">
      <div class="d-flex justify-content-between align-items-start gap-2">
        <div>
          <div class="fw-semibold">{{ ceremony.title }}</div>
          <div class="small text-secondary">{{ ceremony.date }} · {{ ceremony.startTime }} - {{ ceremony.endTime }} · {{ ceremony.location }}</div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-sm btn-outline-primary" [disabled]="isSaving" (click)="editCeremony(ceremony)">Modifier</button>
          <button class="btn btn-sm btn-outline-danger" [disabled]="isSaving" (click)="deleteCeremony(ceremony.id)">Supprimer</button>
        </div>
      </div>
    </li>
  </ul>
</section>
